<!DOCTYPE html>
{% load static %}
<html class="light" lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
		<meta http-equiv="X-UA-Compatible" content="ie=edge" />
		<title>
			Servio - {% block browser_title %}{% endblock %}
		</title>
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
		<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
		{% block custom_page_css %}{% endblock %}
		<link href="{% static 'css/output.css' %}" rel="stylesheet">
		<link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
	</head>
    <body class="bg-[#faf9ff] dark:bg-black text-gray-200 min-h-screen transition-colors duration-500">
		<div 
			id="center-alert-container" 
			class="fixed top-5 left-1/2 -translate-x-1/2 z-99999 w-full max-w-md px-4 space-y-3 pointer-events-none"
		></div>
		<header class="sticky top-0 z-50 w-full border-b border-gray-200/50 dark:border-white/10 bg-white/70 dark:bg-black/70 backdrop-blur-xl">
			<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
				<div class="flex justify-between items-center h-20">
					
					<div class="flex-shrink-0 flex items-center">
						<a href="#" class="group block">
							<img src="{% static 'images/logo/sidebar-logo-light.png' %}" 
								alt="Servio" 
								class="h-14 w-auto object-contain transition-transform duration-200 group-hover:scale-105 block dark:hidden" />
							
							<img src="{% static 'images/logo/sidebar-logo-dark.png' %}" 
								alt="Servio" 
								class="h-14 w-auto object-contain transition-transform duration-200 group-hover:scale-105 hidden dark:block" />
						</a>
					</div>

					<div class="flex items-center gap-6">
						<div class="hidden md:flex items-center gap-2 text-gray-500 dark:text-gray-400">
							<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
							</svg>
							<span class="text-xs font-medium tracking-wide uppercase">Secure Checkout</span>
						</div>

						<button id="theme-toggle" class="p-2.5 rounded-xl bg-gray-100 dark:bg-white/5 border border-transparent dark:border-white/10 text-gray-600 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-white/10 transition-all duration-300">
							<svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"></path></svg>
							<svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
						</button>
					</div>
				</div>
			</div>
		</header>
		{% block body_content %}
		{% endblock %}
	</body>
	<script src="{% static 'js/center-alert.js' %}"></script>
	{% if toast %}
		{{ toast|json_script:"toast-data" }}
	{% endif %}
	<script>
		const themeToggleBtn = document.getElementById('theme-toggle');
		const themeToggleDarkIcon = document.getElementById('theme-toggle-dark-icon');
		const themeToggleLightIcon = document.getElementById('theme-toggle-light-icon');

		// 1. Check for saved user preference or system preference
		if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
			document.documentElement.classList.add('dark');
			themeToggleLightIcon.classList.remove('hidden');
		} else {
			document.documentElement.classList.remove('dark');
			themeToggleDarkIcon.classList.remove('hidden');
		}

		// 2. Toggle functionality
		themeToggleBtn.addEventListener('click', function() {
			// Toggle icons inside button
			themeToggleDarkIcon.classList.toggle('hidden');
			themeToggleLightIcon.classList.toggle('hidden');

			// If set via local storage previously
			if (localStorage.getItem('color-theme')) {
				if (localStorage.getItem('color-theme') === 'light') {
					document.documentElement.classList.add('dark');
					localStorage.setItem('color-theme', 'dark');
				} else {
					document.documentElement.classList.remove('dark');
					localStorage.setItem('color-theme', 'light');
				}

			// If NOT set via local storage previously
			} else {
				if (document.documentElement.classList.contains('dark')) {
					document.documentElement.classList.remove('dark');
					localStorage.setItem('color-theme', 'light');
				} else {
					document.documentElement.classList.add('dark');
					localStorage.setItem('color-theme', 'dark');
				}
			}
		});
	</script>
	<script>
		document.addEventListener("DOMContentLoaded", () => {
			const el = document.getElementById("toast-data");
			if (!el) return;
			const toast = JSON.parse(el.textContent);
			showToast(toast.message, toast.type, toast.title);
		})
	</script>
	{% block js_files %}{% endblock %}
</html>
