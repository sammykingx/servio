<!doctype html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>{% block browser_title %}Account Gateway - Servio{% endblock %}</title>

    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Servio">
    <meta property="og:title" content="Servio – Build your team around your project">
    <meta property="og:description" content="Assemble the right service providers. Manage everything in one place.">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
    <link href="{% static 'css/output.css' %}" rel="stylesheet">
    <link rel="icon" type="image/png" href="{% static 'images/favicon.png' %}">
</head>

<body
    x-data="{ page: 'auth-base', loaded: true, darkMode: false }"
    x-init="darkMode = JSON.parse(localStorage.getItem('darkMode')) || false; $watch('darkMode', value => localStorage.setItem('darkMode', JSON.stringify(value)))"
    :class="{'dark bg-gray-950': darkMode === true}"
    class="bg-gray-50 transition-colors duration-200"
>
    {% include "components/preloader.html" %}

    <div
		id="left-alert-container"
		class="fixed left-5 top-5 z-50 space-y-3 max-w-xs sm:left-8 sm:top-8
			md:left-12 md:top-12 lg:left-16 lg:top-16 xl:left-24 pointer-events-none"
    ></div>

    <main class="flex min-h-screen w-full">
        
        <div class="flex w-full flex-col items-center justify-start px-6 py-12 lg:w-1/2 lg:justify-center lg:px-12">
            
			{% comment %}
            <div class="mb-10 lg:hidden">
                <a href="/">
                    <img src="{% static 'images/logo/sidebar-logo-light.png' %}" class="h-10 w-auto" alt="Logo" />
                </a>
            </div>
			{% endcomment %}

            <div class="w-full max-w-[400px] animate-fade-in py-2.5">
                {% block content %}{% endblock %}
            </div>
        </div>

        <div class="relative hidden w-1/2 flex-col items-center justify-center overflow-hidden bg-brand-950 lg:flex dark:bg-white/5">
            <div class="absolute right-0 top-0 w-full max-w-[400px] opacity-20">
                <img src="{% static 'images/shape/grid-01.svg' %}" alt="grid" />
            </div>
            <div class="absolute bottom-0 left-0 w-full max-w-[400px] rotate-180 opacity-20">
                <img src="{% static 'images/shape/grid-01.svg' %}" alt="grid" />
            </div>

            <div class="relative z-10 flex flex-col items-center text-center">
                <a href="/" class="mb-6 block transition-transform hover:scale-105">
                    <img src="{% static 'images/logo/sidebar-logo-dark.png' %}" class="h-16 w-auto" alt="Logo" />
                </a>
                <p class="max-w-xs text-md text-gray-300 dark:text-white/60">
                    The seamless way to find, book, and manage services.
                </p>
            </div>
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-50">
        <button
            class="flex h-12 w-12 items-center justify-center rounded-full bg-brand-500 text-white shadow-lg hover:bg-brand-600 transition-all active:scale-95"
            @click="darkMode = !darkMode"
        >
            <svg x-show="darkMode" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707m12.728 0A9 9 0 115.636 5.636m12.728 12.728L5.636 5.636" />
            </svg>
            <svg x-show="!darkMode" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>
    </div>

    <script defer src="{% static 'js/vendors/init-alpine.js' %}"></script>
    <script defer src="{% static 'js/vendors/alpine.min.js' %}"></script>
    <script defer src="{% static 'js/left-alert.js' %}"></script>
    {% block custom_page_js %}{% endblock %}
</body>
</html>
