<div class="flex flex-col">
    <div class="flex-1 flex items-center justify-center p-8 pb-20">
        <div class="flex flex-col items-center justify-center max-w-2xl w-full">
            <div class="relative flex items-center justify-center size-48 mb-8">
                <div class="absolute inset-0 flex items-center justify-center">
                    <div class="size-40 bg-blue-100 dark:bg-blue-900/30 rounded-full blur-2xl opacity-70"></div>
                    <div class="absolute size-32 bg-indigo-50 dark:bg-indigo-900/20 rounded-full blur-xl opacity-60 animate-pulse"></div>
                </div>

                <div class="relative z-20 flex items-center justify-center size-24 bg-white dark:bg-[#1a202c] rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700">
                    <span class="text-4xl mb-1">🚀</span>
                </div>

                <div class="absolute top-2 -right-2 z-10 flex items-center justify-center size-12 bg-white dark:bg-[#232936] rounded-xl shadow-lg border border-slate-50 dark:border-slate-700 -rotate-12">
                    <span class="material-symbols-outlined text-xl text-green-500">payments</span>
                </div>

                <div class="absolute bottom-1 -left-3 z-10 flex items-center justify-center size-14 bg-white dark:bg-[#232936] rounded-xl shadow-lg border border-slate-50 dark:border-slate-700 rotate-12">
                    <span class="material-symbols-outlined text-2xl text-amber-400">star</span>
                </div>
            </div>

            <div class="text-center max-w-md space-y-3 mb-8">
                <h2 class="text-2xl font-semibold text-slate-900 dark:text-white">Ready to get paid?</h2>
                <p class="text-slate-500 dark:text-slate-400 text-sm md:text-base leading-relaxed">
                    Once you start taking on projects, your earnings and payouts will show up here. Your first paycheck is just a project away!
                </p>
            </div>

            <button 
                @click="showToast('Payment Processor not configured', 'info', 'Payment Service')"
                class="group flex items-center justify-center gap-2 bg-brand-500 hover:bg-blue-700 text-white font-semibold py-3 px-8 rounded-lg transition-all duration-200 shadow-lg shadow-brand-500/20 transform hover:-translate-y-0.5">
                <span class="material-symbols-outlined text-[20px]">account_balance_wallet</span>
                <span>Connect Your Bank</span>
            </button>

            <a class="mt-6 text-sm font-medium text-slate-500 hover:text-brand-500 dark:text-slate-400 dark:hover:text-blue-300 transition-colors flex items-center gap-1" href="#">
                How do payouts work?
                <span class="material-symbols-outlined text-base">arrow_forward</span>
            </a>
        </div>
    </div>
</div>
